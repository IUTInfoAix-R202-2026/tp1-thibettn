<svg viewBox="0 0 500 380" xmlns="http://www.w3.org/2000/svg" width="500" height="380">
  <!-- Fond plateau -->
  <rect x="0" y="0" width="500" height="380" rx="6" fill="#1a1a2e" stroke="#666" stroke-width="2"/>

  <!-- Titre -->
  <text x="250" y="25" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#e0e0e0">... Pac Man ...</text>

  <!-- Grille légère -->
  <g stroke="#2a2a4e" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="40" x2="500" y2="40"/>
    <line x1="0" y1="60" x2="500" y2="60"/>
    <line x1="0" y1="80" x2="500" y2="80"/>
    <line x1="0" y1="100" x2="500" y2="100"/>
    <line x1="20" y1="40" x2="20" y2="380"/>
    <line x1="40" y1="40" x2="40" y2="380"/>
    <line x1="60" y1="40" x2="60" y2="380"/>
    <line x1="80" y1="40" x2="80" y2="380"/>
  </g>

  <!-- Pacman -->
  <g transform="translate(50, 150)">
    <circle cx="10" cy="10" r="10" fill="#f1c40f"/>
    <line x1="10" y1="10" x2="20" y2="10" stroke="#1a1a2e" stroke-width="2"/>
  </g>
  <text x="50" y="185" font-family="sans-serif" font-size="10" fill="#f1c40f">Pacman</text>
  <text x="50" y="197" font-family="sans-serif" font-size="9" fill="#888">← ↑ → ↓</text>

  <!-- Fantôme -->
  <g transform="translate(250, 150)">
    <rect x="0" y="10" width="20" height="10" fill="#3498db"/>
    <circle cx="10" cy="10" r="10" fill="#3498db"/>
    <circle cx="6" cy="6" r="2" fill="white"/>
    <circle cx="7" cy="6" r="1" fill="#1a1a2e"/>
    <circle cx="14" cy="6" r="2" fill="white"/>
    <circle cx="15" cy="6" r="1" fill="#1a1a2e"/>
  </g>
  <text x="250" y="185" font-family="sans-serif" font-size="10" fill="#3498db">Fantôme</text>
  <text x="250" y="197" font-family="sans-serif" font-size="9" fill="#888">Z Q S D</text>

  <!-- Flèche collision -->
  <line x1="80" y1="160" x2="240" y2="160" stroke="#e74c3c" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="140" y="145" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#e74c3c">collision ?</text>

  <!-- Légende -->
  <rect x="320" y="240" width="160" height="120" rx="4" fill="#2a2a4e" stroke="#444" stroke-width="1"/>
  <text x="400" y="260" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#e0e0e0">À compléter</text>
  <text x="335" y="280" font-family="sans-serif" font-size="10" fill="#f1c40f">Pacman :</text>
  <text x="335" y="295" font-family="sans-serif" font-size="9" fill="#aaa">  bouche haut/bas</text>
  <text x="335" y="315" font-family="sans-serif" font-size="10" fill="#3498db">Fantôme :</text>
  <text x="335" y="330" font-family="sans-serif" font-size="9" fill="#aaa">  yeux 4 directions</text>
  <text x="335" y="350" font-family="sans-serif" font-size="9" fill="#aaa">  déplacement ZQSD</text>
</svg>
