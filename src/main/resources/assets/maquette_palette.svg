<svg viewBox="0 0 500 300" xmlns="http://www.w3.org/2000/svg" width="500" height="300">
  <!-- Fond fenêtre -->
  <rect x="0" y="0" width="500" height="300" rx="6" fill="#ffffff" stroke="#666" stroke-width="2"/>

  <!-- HBox (top) — fond gris clair -->
  <rect x="1" y="1" width="498" height="60" rx="5" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <!-- Bouton Rouge -->
  <rect x="30" y="12" width="100" height="36" rx="6" fill="#e74c3c" stroke="#c0392b" stroke-width="1"/>
  <text x="80" y="36" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="white">Rouge</text>
  <!-- Bouton Vert -->
  <rect x="150" y="12" width="100" height="36" rx="6" fill="#27ae60" stroke="#1e8449" stroke-width="1"/>
  <text x="200" y="36" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="white">Vert</text>
  <!-- Bouton Bleu -->
  <rect x="270" y="12" width="100" height="36" rx="6" fill="#2980b9" stroke="#1f6fa3" stroke-width="1"/>
  <text x="320" y="36" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="white">Bleu</text>
  <!-- Annotation HBox -->
  <text x="420" y="36" font-family="sans-serif" font-size="10" fill="#999">HBox (top)</text>

  <!-- Pane zone (center) — fond rouge pour illustrer un clic -->
  <rect x="1" y="61" width="498" height="175" fill="#e74c3c" stroke="#bbb" stroke-width="1"/>
  <!-- Annotation zone -->
  <text x="250" y="155" text-anchor="middle" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.7)">zone de couleur</text>
  <text x="420" y="90" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">Pane (center)</text>
  <text x="420" y="103" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">id: zone</text>

  <!-- Label compteurs (bottom) -->
  <rect x="1" y="236" width="498" height="63" rx="0" fill="#f5f5f5" stroke="#bbb" stroke-width="1"/>
  <text x="250" y="274" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#333">Rouge: 2    Vert: 0    Bleu: 1</text>
  <!-- Annotation bottom -->
  <text x="420" y="258" font-family="sans-serif" font-size="10" fill="#999">Label (bottom)</text>
  <text x="420" y="271" font-family="sans-serif" font-size="10" fill="#999">id: compteurs</text>
</svg>
