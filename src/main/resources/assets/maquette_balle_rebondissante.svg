<svg viewBox="0 0 420 500" xmlns="http://www.w3.org/2000/svg" width="420" height="500">
  <!-- Fond fenêtre -->
  <rect x="0" y="0" width="420" height="500" rx="6" fill="#ffffff" stroke="#666" stroke-width="2"/>

  <!-- HBox boutons (top) -->
  <rect x="1" y="1" width="418" height="50" rx="5" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <rect x="12" y="10" width="90" height="30" rx="5" fill="#4a90d9" stroke="#3a7bc8" stroke-width="1"/>
  <text x="57" y="30" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="white">Démarrer</text>
  <rect x="112" y="10" width="70" height="30" rx="5" fill="#ccc" stroke="#aaa" stroke-width="1"/>
  <text x="147" y="30" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">Pause</text>
  <rect x="192" y="10" width="90" height="30" rx="5" fill="#ccc" stroke="#aaa" stroke-width="1"/>
  <text x="237" y="30" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">Reprendre</text>
  <rect x="292" y="10" width="60" height="30" rx="5" fill="#ccc" stroke="#aaa" stroke-width="1"/>
  <text x="322" y="30" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">Stop</text>
  <text x="380" y="30" font-family="sans-serif" font-size="9" fill="#999">HBox</text>

  <!-- Slider -->
  <rect x="1" y="51" width="418" height="40" fill="#f5f5f5" stroke="#bbb" stroke-width="1"/>
  <line x1="30" y1="71" x2="350" y2="71" stroke="#aaa" stroke-width="2" stroke-linecap="round"/>
  <circle cx="180" cy="71" r="8" fill="#4a90d9" stroke="#3a7bc8" stroke-width="1"/>
  <text x="20" y="85" font-family="sans-serif" font-size="9" fill="#999">0.1</text>
  <text x="345" y="85" font-family="sans-serif" font-size="9" fill="#999">5.0</text>
  <text x="380" y="75" font-family="sans-serif" font-size="9" fill="#999">Slider</text>

  <!-- Zone animation (Pane) -->
  <rect x="1" y="91" width="418" height="408" fill="#f0f0f0" stroke="#bbb" stroke-width="1"/>

  <!-- Balle position haute -->
  <circle cx="210" cy="120" r="15" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5" opacity="0.3"/>
  <!-- Flèche -->
  <line x1="210" y1="140" x2="210" y2="350" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowhead)"/>
  <line x1="210" y1="350" x2="210" y2="140" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="6,4"/>
  <!-- Balle position basse -->
  <circle cx="210" cy="380" r="15" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>

  <!-- Annotations -->
  <text x="240" y="125" font-family="sans-serif" font-size="10" fill="#999">fromY = 10</text>
  <text x="240" y="385" font-family="sans-serif" font-size="10" fill="#999">toY = 400</text>
  <text x="240" y="260" font-family="sans-serif" font-size="10" fill="#e74c3c">autoReverse</text>
  <text x="350" y="110" font-family="sans-serif" font-size="9" fill="#999">Pane</text>
  <text x="350" y="122" font-family="sans-serif" font-size="9" fill="#999">(zone-animation)</text>

  <!-- Flèches -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e74c3c"/>
    </marker>
  </defs>
</svg>
